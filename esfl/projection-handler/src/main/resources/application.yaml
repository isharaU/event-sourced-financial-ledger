spring:
  application:
    name: projection-handler

  # ── Read-side PostgreSQL datasource ──
  datasource:
    url: jdbc:postgresql://localhost:5433/app_db
    username: app_user
    password: password
    driver-class-name: org.postgresql.Driver

  # ── Flyway ──
  # Disabled: query-api module owns the read model migration.
  # The projection-handler only writes projected data to these tables.
  flyway:
    enabled: false

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: none          # Schema managed by Flyway in query-api module
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

spring:
  application:
    name: event-store

  # ── Write-side PostgreSQL datasource ──
  datasource:
    url: jdbc:postgresql://localhost:5432/app_db
    username: app_user
    password: password
    driver-class-name: org.postgresql.Driver

  # ── Flyway versioned migrations ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema — never let Hibernate modify it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
